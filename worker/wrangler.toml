name = "lpg-tiles-proxy"
main = "src/index.ts"
compatibility_date = "2026-04-24"

# UPSTREAM_URL binding — change this when the tiles-latest release
# location ever moves. No code changes needed.
[vars]
UPSTREAM_URL = "https://github.com/alvin551/lpg-tiles/releases/download/tiles-latest/uk.pmtiles"

# Enable the workers.dev preview URL so we get a ready-to-use HTTPS
# endpoint without wiring up a custom domain. Shape:
# https://lpg-tiles-proxy.<your-subdomain>.workers.dev
workers_dev = true
